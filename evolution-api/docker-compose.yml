# =====================================================================
# 4Flow — Evolution API (WhatsApp Web emulado, open source)
# Deploy gratuito no Railway: railway.app → New Project → Deploy from
# Docker Image (atendai/evolution-api) ou suba este compose num VPS.
# =====================================================================
version: '3.8'

services:
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Chave de autenticação — use a mesma no .env do frontend (VITE_EVOLUTION_API_KEY)
      - AUTHENTICATION_API_KEY=troque-por-uma-chave-forte-aqui
      - AUTHENTICATION_TYPE=apikey
      # Webhook global: aponta para o Cloudflare Worker da 4Flow
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=https://api.4flow.com.br/api/whatsapp/webhook
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      # Persistência local das sessões
      - DATABASE_ENABLED=false
      - CACHE_REDIS_ENABLED=false
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  evolution_instances:
